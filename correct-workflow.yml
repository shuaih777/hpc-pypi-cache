name: Download Python wheels for HPC

on:
  workflow_dispatch:

jobs:
  download-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheels
        run: |
          mkdir -p wheels

          # Step 1: Download everything (no platform restriction)
          # This resolves dependencies properly
          pip download -d wheels \
            --python-version 3.12 \
            --only-binary=:all: \
            regex \
            tokenizers \
            safetensors \
            transformers \
            accelerate \
            sentence-transformers \
            peft \
            einops \
            omegaconf \
            gensim

          # Step 2: Remove non-linux wheels (windows/macos) if any
          cd wheels
          rm -f *win*.whl *macosx*.whl 2>/dev/null || true
          echo "=== Downloaded wheels ==="
          ls -la
          echo "=== Total files: $(ls *.whl | wc -l) ==="

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="wheels-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" wheels/*.whl \
            --title "Python wheels for HPC ($(date +%Y-%m-%d))" \
            --notes "Wheels for Python 3.12 / Linux x86_64. Install with: pip install --no-index --find-links ./wheels/ <package>"
